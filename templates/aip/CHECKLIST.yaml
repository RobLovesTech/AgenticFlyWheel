version: 1
feature: "{{FEATURE_SLUG}}"
packet_level: full
requirements_mode: technical
delivery_surfaces: []
enabled_modules:
  - contracts
  - data_model
  - backend_implementation
  - orchestration_and_ui
  - observability
  - runbook
  - operating_model
  - gtm_and_launch
  - client_rollout
  - enablement_and_support
  - governance_and_approvals
omitted_modules: []
status: pending
constraints:
  - Respect privacy and security constraints
parity: {}
env_defaults: {}
phases:
  - id: design
    name: Design & Planning
    description: Finalize collaboration output plus any enabled planning/contract modules
    tasks:
      - id: collaboration-readiness
        title: Confirm user-approved collaboration readiness and record Collaboration Summary
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml"]
        acceptance:
          - "REVIEWS.md records the structured Collaboration Summary receipt or an explicit direct/template-only scaffold exception"
          - "Agent-inferred assumptions are not treated as accepted assumptions without user confirmation"
          - "No packet implementation task begins until this evidence exists"
        status: pending
      - id: contracts
        title: If `contracts` is enabled, complete CONTRACTS.md (signals, thresholds, events, fallbacks)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CONTRACTS.md"]
        status: pending
      - id: operating-model
        title: If `operating_model` is enabled, complete OPERATING_MODEL.md (workflow, owners, handoffs, exceptions)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/OPERATING_MODEL.md"]
        status: pending
      - id: gtm-launch
        title: If `gtm_and_launch` is enabled, complete GTM_AND_LAUNCH.md (audience, sequencing, messaging, metrics)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/GTM_AND_LAUNCH.md"]
        status: pending
      - id: client-rollout-plan
        title: If `client_rollout` is enabled, complete CLIENT_ROLLOUT.md (cohorts, transition rules, rollback)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CLIENT_ROLLOUT.md"]
        status: pending
      - id: enablement-support-plan
        title: If `enablement_and_support` is enabled, complete ENABLEMENT_AND_SUPPORT.md (training, support, escalation)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/ENABLEMENT_AND_SUPPORT.md"]
        status: pending
      - id: governance-approvals
        title: If `governance_and_approvals` is enabled, complete GOVERNANCE_AND_APPROVALS.md (sign-offs, gates, evidence)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/GOVERNANCE_AND_APPROVALS.md"]
        status: pending
      - id: review-gauntlet
        title: Capture discovery and review outputs in REVIEWS.md
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md"]
        status: pending
      - id: backend_plan
        title: If `backend_implementation` is enabled, complete BACKEND_IMPLEMENTATION.md (files, flags, pseudocode)
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/BACKEND_IMPLEMENTATION.md"]
        status: pending
  - id: backend
    name: Backend Implementation
    description: Enable this phase only when `backend_implementation` is in enabled_modules
    tasks:
      - id: impl-core
        title: Implement enabled backend/service logic per BACKEND_IMPLEMENTATION.md
        files: []
        status: pending
      - id: tests-backend
        title: Add unit/integration tests for backend changes
        files: []
        status: pending
  - id: frontend
    name: Frontend Implementation
    description: Enable this phase only when `orchestration_and_ui` is in enabled_modules
    tasks:
      - id: impl-ui
        title: Implement enabled UI/orchestration changes
        files: []
        status: pending
      - id: tests-frontend
        title: Update/add frontend unit tests
        files: []
        status: pending
  - id: operating
    name: Operating Readiness & Launch
    description: Enable this phase only when operating modules or operating delivery surfaces are in scope
    tasks:
      - id: implement-operating-model
        title: Implement workflow, handoff, launch, rollout, enablement, and approval changes called for by enabled operating modules
        files: []
        status: pending
      - id: verify-operating-readiness
        title: Validate cohorting, training, support, approvals, and launch readiness evidence
        files: []
        status: pending
  - id: docs
    name: Docs Correction & Updates
    description: Update global docs as required
    tasks:
      - id: global-docs
        title: Update global docs and AI-facing guides as required
        files: [docs/ai/INDEX.md]
        status: pending
  - id: observe
    name: Observability & Rollout
    description: Include only the observability/runbook tasks for the modules enabled in this packet
    tasks:
      - id: metrics
        title: If `observability` is enabled, add metrics per OBSERVABILITY.md
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/OBSERVABILITY.md"]
        status: pending
      - id: runbook
        title: If `runbook` is enabled, add RUNBOOK and execute validation
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/RUNBOOK.md"]
        status: pending
  - id: handoff
    name: Docs & Handoff
    description: Final doc sync, required implementation audit, remediation, and closure
    tasks:
      - id: build-verify
        title: Run verification commands (tests/build/lint) for impacted components
        files: []
        status: pending
      - id: reviews-sync
        title: Sync REVIEWS.md accepted decisions, open risks, and final verdict
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md"]
        status: pending
      - id: context
        title: Update CONTEXT.md with final behavior
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CONTEXT.md"]
        status: pending
      - id: readiness-evidence
        title: Record readiness evidence, approvals, training/comms completion, support ownership, or explicit not-applicable rationale
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.md"]
        status: pending
      - id: registry
        title: Add or update Feature Registry entry
        files: [docs/features/REGISTRY.yaml]
        status: pending
      - id: prompt-qa
        title: Run Agent Prompt QA Checklist before generating or refreshing prompt artifacts
        files: [docs/templates/AIP/AGENT_PROMPT_QA_CHECKLIST.md]
        status: pending
      - id: agent-prompt
        title: Generate or refresh AGENT_PROMPT.txt from current packet docs
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/AGENT_PROMPT.txt", "docs/templates/AIP/AGENT_PROMPT_AUTHORING_GUIDE.md"]
        status: pending
      - id: audit-prompt
        title: Generate or refresh IMPLEMENTATION_AUDIT_PROMPT.txt from current packet docs
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/IMPLEMENTATION_AUDIT_PROMPT.txt", "docs/templates/AIP/IMPLEMENTATION_AUDIT_PROMPT.txt", "AgenticFlywheel/prompts/IMPLEMENTATION_AUDIT.md"]
        status: pending
      - id: implementation-audit
        title: Run packet-local IMPLEMENTATION_AUDIT_PROMPT.txt and record verdict in REVIEWS.md
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/IMPLEMENTATION_AUDIT_PROMPT.txt", "AgenticFlywheel/prompts/IMPLEMENTATION_AUDIT.md"]
        status: pending
      - id: audit-remediation
        title: Fix or explicitly disposition every implementation audit finding
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md"]
        status: pending
      - id: audit-reverify
        title: Re-run targeted verification for audit findings and update evidence
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/REVIEWS.md"]
        status: pending
      - id: packet-closure
        title: Confirm audit passed, findings are resolved, and packet may be marked completed
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.md"]
        status: pending
verification:
  commands: []
  acceptance: []
