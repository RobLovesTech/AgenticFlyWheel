version: 1
feature: "{{FEATURE_SLUG}}"
status: pending
constraints: []
env_defaults: {}
phases:
  - id: collaboration
    name: Collaboration & Scope
    description: Confirm user intent before implementation
    tasks:
      - id: collaboration-readiness
        title: Confirm user-approved collaboration readiness and record Collaboration Summary
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml"]
        acceptance:
          - "README.md records the structured Collaboration Summary receipt or an explicit direct/template-only scaffold exception"
          - "Agent-inferred assumptions are not treated as accepted assumptions without user confirmation"
          - "No packet implementation task begins until this evidence exists"
        status: pending
  - id: implement
    name: Implementation
    description: Implement the feature with tests
    tasks:
      - id: code
        title: Implement changes per README.md
        files: []
        status: pending
      - id: tests
        title: Add unit and integration tests
        files: []
        status: pending
  - id: handoff
    name: Documentation & Registry
    description: Update docs, run scaled implementation audit, and update Feature Registry
    tasks:
      - id: build-verify
        title: Run verification commands (tests/build/lint) for impacted components
        files: []
        status: pending
      - id: global-docs
        title: Update global docs and AI-facing guides as required
        files: [docs/ai/INDEX.md]
        status: pending
      - id: update-readme
        title: Update lightweight AIP README.md with final details
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md"]
        status: pending
      - id: registry
        title: Add or update Feature Registry entry
        files: [docs/features/REGISTRY.yaml]
        status: pending
      - id: implementation-audit
        title: Run scaled IMPLEMENTATION_AUDIT.md and record verdict in README.md
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md", "AgenticFlywheel/prompts/IMPLEMENTATION_AUDIT.md"]
        status: pending
      - id: audit-remediation
        title: Fix or explicitly disposition every implementation audit finding
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml", "docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md"]
        status: pending
      - id: audit-reverify
        title: Re-run targeted verification for audit findings and update evidence
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/README.md"]
        status: pending
      - id: packet-closure
        title: Confirm audit passed, findings are resolved, and packet may be marked completed
        files: ["docs/Agent Implementation Packets/{{FEATURE_SLUG}}/CHECKLIST.yaml"]
        status: pending
verification:
  commands: []
  acceptance: []
